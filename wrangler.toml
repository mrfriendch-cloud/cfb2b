name = "cf-b2b-website"
main = "src/index.js"
compatibility_date = "2025-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "b2b_database"
database_id = "f1d2ceff-31eb-4ed5-a995-24c0c534c0a1"

# Environment variables
[vars]
ENVIRONMENT = "production"

# R2 Storage for images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "b2b-product-images"

[[kv_namespaces]]
binding = "STATIC_ASSETS"
id = "959962ad6c394a82b222979ac1635bb0"